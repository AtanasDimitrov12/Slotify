name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MONGO_URI: mongodb://localhost:27017/barber_reservation
      MONGO_URI_TEST: mongodb://localhost:27017/barber_reservation_test
      MONGO_URI_E2E: mongodb://localhost:27017/barber_reservation_e2e
      JWT_SECRET: test-jwt-secret-for-ci
      GEMINI_API_KEY: test-gemini-key-for-ci
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      VITE_API_URL: http://localhost:4000

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit Tests (Backend)
        run: pnpm run test

      - name: Unit Tests (Frontend)
        run: pnpm -C apps/web-admin test

      - name: Integration Tests (Backend)
        run: pnpm run test:api:integration

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web-admin

      - name: E2E Tests (Frontend)
        run: pnpm run test:web:e2e

      - name: Build
        run: pnpm run build